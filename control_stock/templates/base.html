<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#edeeef",
                        "on-primary-fixed": "#001a42",
                        "inverse-primary": "#aec6ff",
                        "tertiary-container": "#67778b",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "on-surface-variant": "#414754",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed": "#d8e2ff",
                        "surface-dim": "#d9dadb",
                        "surface-container-low": "#f3f4f5",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#b1c8ea",
                        "tertiary-fixed": "#d3e4fb",
                        "surface-tint": "#005ac4",
                        "on-tertiary-container": "#fffeff",
                        "on-secondary-fixed": "#021c36",
                        "tertiary-fixed-dim": "#b7c8de",
                        "on-secondary-container": "#4a617e",
                        "tertiary": "#4e5e71",
                        "error-container": "#ffdad6",
                        "secondary": "#49607d",
                        "primary": "#0058c2",
                        "surface": "#f8f9fa",
                        "secondary-fixed": "#d2e4ff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffeff",
                        "inverse-surface": "#2e3132",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#004396",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "outline": "#727786",
                        "on-tertiary-fixed": "#0c1d2d",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-fixed-variant": "#38485a",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#324864",
                        "on-error": "#ffffff",
                        "background": "#f8f9fa",
                        "secondary-container": "#c4dcfe",
                        "primary-container": "#0070f2",
                        "outline-variant": "#c1c6d7",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#aec6ff"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        sm: "8px",
                        lg: "24px",
                        gutter: "1rem",
                        md: "16px",
                        xl: "32px",
                        "container-max": "1440px",
                        xs: "4px",
                        base: "4px"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        caption: ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        display: ["Hanken Grotesk"]
                    },
                    fontSize: {
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-lg": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        caption: ["11px", { lineHeight: "14px", fontWeight: "400" }],
                        "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        display: ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #c1c6d7;
            border-radius: 10px;
        }
        
        /* Transition for the mobile menu */
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
        .menu-open {
            transform: translateX(0) !important;
        }
        .menu-closed {
            transform: translateX(-100%);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen relative">
    
    <!-- TopNavBar (Compartido) -->
    <header class="bg-on-tertiary-fixed h-16 w-full flex items-center shadow-sm border-b border-outline-variant fixed top-0 left-0 z-50 justify-between px-md max-w-full">
        <div class="flex items-center gap-sm">
            <!-- Hamburguer Menu Button (Visible only on mobile) -->
            <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center p-sm text-surface-container-lowest hover:bg-on-primary-fixed rounded-full transition-colors" onclick="toggleMobileMenu()">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">developer_board</span>
            <!-- Added Title for mobile context -->
            <span class="font-headline-md text-surface-container-lowest md:hidden">TechPhone</span>
        </div>
        <div class="flex items-center gap-md">
            <div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant overflow-hidden flex items-center justify-center">
                <img alt="User profile" class="object-cover w-full h-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1ld-aASKAWHsozob57R8d3EY4iUaszK7CJP5KyoCsPDn0LV0oE2NTkxHylv_OZSPh7lNDbdkXOQ7Z2ueY7idnps09scb3QgyBE9u404_mwlfnxtplSKjipCqJh9f89_munkdZLeu1u6XJr-y1XXuDQIrjb8rHG_xDjZBWi9-kLu3b4Kal3XHJTEwkEuM-FFlaTeodpomXn7lp6TVEUwZhFGrUyNjqM7S8kMvgFallKqes2qFVTV6kYg">
            </div>
        </div>
    </header>

    <div class="flex pt-16 h-screen overflow-hidden">
        
        <!-- Overlay (Dark background when mobile menu is open) -->
        <div id="mobile-overlay" class="fixed inset-0 bg-[#00000080] z-40 hidden md:hidden" onclick="toggleMobileMenu()"></div>

        <!-- SideNavBar (Compartido) -->
        <nav id="mobile-menu" class="flex flex-col h-full py-md overflow-y-auto bg-surface-container-low w-64 fixed left-0 top-16 border-r border-outline-variant z-50 menu-closed md:transform-none md:flex md:w-60">
            <div class="px-md mb-lg">
                <h2 class="font-headline-md text-headline-md text-on-surface">TechPhone</h2>
                <p class="font-label-md text-label-md text-on-surface-variant opacity-70">V2.4.0</p>
            </div>
            <ul class="flex-1 space-y-xs">
                <li>
                    <a class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-150 ease-in-out {% block nav_panel %}{% endblock %}" href="{% url 'panel_control' %}">
                        <span class="material-symbols-outlined">dashboard</span>
                        <span class="font-label-md text-label-md">Panel de Control</span>
                    </a>
                </li>
                <li>
                    <a class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-150 ease-in-out {% block nav_ventas %}{% endblock %}" href="{% url 'ventas' %}">
                        <span class="material-symbols-outlined">payments</span>
                        <span class="font-label-md text-label-md">Ventas</span>
                    </a>
                </li>
                <li>
                    <a class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-150 ease-in-out {% block nav_stock %}{% endblock %}" href="{% url 'stock' %}">
                        <span class="material-symbols-outlined">devices</span>
                        <span class="font-label-md text-label-md">Stock</span>
                    </a>
                </li>
                <li>
                    <a class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-150 ease-in-out {% block nav_clientes %}{% endblock %}" href="{% url 'clientes' %}">
                        <span class="material-symbols-outlined">person_add</span>
                        <span class="font-label-md text-label-md">Entrada de Clientes</span>
                    </a>
                </li>
                <li>
                    <a class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-150 ease-in-out {% block nav_reservas %}{% endblock %}" href="{% url 'reserva' %}">
                        <span class="material-symbols-outlined">bookmark_add</span>
                        <span class="font-label-md text-label-md">Reserva de Dispositivos</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 ml-0 md:ml-60 p-md md:p-lg overflow-y-auto w-full bg-background relative z-0">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-overlay');
            const isClosed = menu.classList.contains('menu-closed');
            
            if (isClosed) {
                menu.classList.remove('menu-closed');
                menu.classList.add('menu-open');
                overlay.classList.remove('hidden');
            } else {
                menu.classList.add('menu-closed');
                menu.classList.remove('menu-open');
                overlay.classList.add('hidden');
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
